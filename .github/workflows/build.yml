name: Build and Push Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-operator:
    name: Build Operator Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for operator image
        id: meta-operator
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/payback159/enshrouded-operator
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push operator image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-operator.outputs.tags }}
          labels: ${{ steps.meta-operator.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-sidecar:
    name: Build Sidecar Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for sidecar image
        id: meta-sidecar
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/payback159/enshrouded-metrics-sidecar
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push sidecar image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.sidecar
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-sidecar.outputs.tags }}
          labels: ${{ steps.meta-sidecar.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
