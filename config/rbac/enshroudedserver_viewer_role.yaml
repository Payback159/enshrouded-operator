# This rule is not used by the project enshrouded-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to enshrouded.enshrouded.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: enshrouded-operator
    app.kubernetes.io/managed-by: kustomize
  name: enshroudedserver-viewer-role
rules:
- apiGroups:
  - enshrouded.enshrouded.io
  resources:
  - enshroudedservers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - enshrouded.enshrouded.io
  resources:
  - enshroudedservers/status
  verbs:
  - get
