apiVersion: enshrouded.enshrouded.io/v1alpha1
kind: EnshroudedServer
metadata:
  name: my-enshrouded-server
  namespace: default
spec:
  serverName: "My Enshrouded Server"
  port: 15637
  steamPort: 27015
  serverSlots: 16
  serverIP: "0.0.0.0"
  # serverPasswordSecretRef:
  #   name: enshrouded-password
  #   key: password
  image:
    repository: sknnr/enshrouded-dedicated-server
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "2"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 6Gi
  storage:
    size: 10Gi
    # storageClassName: standard

  # verticalScaling enables optional Vertical Pod Autoscaler (VPA) integration.
  # Requires the VPA CRDs to be installed; the operator continues normally when absent.
  # verticalScaling:
  #   enabled: true
  #   # updateMode controls how recommendations are applied:
  #   #   Off      — VPA observes only, operator applies nothing
  #   #   WhenIdle — operator applies CPU always; defers memory scale-down while players are connected (default)
  #   #   InPlace  — VPA applies recommendations directly (requires Kubernetes ≥ 1.33 InPlacePodVerticalScaling gate)
  #   updateMode: WhenIdle
  #   minAllowed:
  #     # Proton/Wine overhead: keep memory at or above 6Gi to avoid OOM-kills during world load
  #     memory: "6Gi"
  #     cpu: "500m"
  #   maxAllowed:
  #     memory: "16Gi"
  #     cpu: "8"
